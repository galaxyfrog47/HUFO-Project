
<style>
#gameCanvas{display:block;border-radius:12px;border:0.5px solid var(--color-border-tertiary);}
#ui{display:flex;align-items:center;gap:16px;margin-bottom:10px;flex-wrap:wrap;}
.stat{font-size:15px;font-weight:500;color:var(--color-text-primary);display:flex;align-items:center;gap:5px;}
#overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.72);border-radius:12px;}
#overlay h2{color:#fff;font-size:22px;font-weight:500;margin:0 0 8px;}
#overlay p{color:#ddd;font-size:14px;margin:0 0 20px;text-align:center;}
#overlay button{padding:10px 28px;font-size:15px;border-radius:8px;border:none;background:#f5a623;color:#222;font-weight:500;cursor:pointer;}
#overlay button:hover{background:#e09415;}
#wrapper{position:relative;width:100%;max-width:640px;margin:0 auto;}
#touch-ctrl{display:grid;grid-template-columns:48px 48px 48px;grid-template-rows:48px 48px;gap:5px;margin-top:10px;justify-content:center;}
.tbtn{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;user-select:none;-webkit-user-select:none;touch-action:none;}
</style>
<div style="padding:1rem 0;">
  <div id="ui">
    <div class="stat" id="lives-disp">❤️❤️❤️</div>
    <div class="stat">🍯 <span id="score">0</span></div>
    <div class="stat">🐝 <span id="beecount">0</span></div>
  </div>
  <div id="wrapper">
    <canvas id="gameCanvas" width="640" height="420"></canvas>
    <div id="overlay">
      <h2>🐻 Mézes Medve</h2>
      <p>Gyűjtsd a mézes üvegeket, kerüld a méheket!<br>10 másodpercenként szív jelenik meg (+1 élet).<br>Irányítás: nyilak / WASD</p>
      <button id="startBtn">Játék indítása</button>
    </div>
  </div>
  <div id="touch-ctrl">
    <div></div><div class="tbtn" id="tb-up">▲</div><div></div>
    <div class="tbtn" id="tb-left">◀</div><div class="tbtn" id="tb-down">▼</div><div class="tbtn" id="tb-right">▶</div>
  </div>
</div>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
let s, animId, keys={}, touches={};

function rnd(a,b){return a+Math.random()*(b-a);}
function dst(ax,ay,bx,by){return Math.sqrt((ax-bx)**2+(ay-by)**2);}

function safePos(avoid, avoidR, margin=40){
  let x,y,tries=0;
  do{ x=rnd(margin,W-margin); y=rnd(margin,H-margin); tries++; }
  while(tries<200 && dst(x,y,avoid.x,avoid.y)<avoidR);
  return {x,y};
}

function initState(){
  const bear={x:W/2,y:H/2,r:18,speed:3.2,inv:0};
  const jp=safePos(bear,120);
  return {
    bear,
    bees:[],
    jar:{x:jp.x,y:jp.y},
    hearts:[],
    score:0,lives:3,
    heartTimer:0,
    running:false
  };
}

function spawnBee(s){
  let p=safePos(s.bear,100);
  s.bees.push({x:p.x,y:p.y,vx:(Math.random()-0.5)*2,vy:(Math.random()-0.5)*2,r:8,speed:1.4+Math.random()*0.5});
}

function setLives(){ document.getElementById('lives-disp').textContent='❤️'.repeat(Math.max(0,s.lives)); }
function setBees(){ document.getElementById('beecount').textContent=s.bees.length; }

/* --- drawing --- */
function drawBg(){
  ctx.fillStyle='#2d5a27'; ctx.fillRect(0,0,W,H);
  for(let i=0;i<100;i++){
    ctx.fillStyle=`rgba(50,${100+i%60},30,0.18)`;
    ctx.fillRect((i*73+11)%W,(i*59+7)%H,2+(i%3),2+(i%3));
  }
}

function drawBear(b){
  ctx.save();
  if(b.inv>0 && Math.floor(Date.now()/70)%2===0){ctx.globalAlpha=0.25;}
  ctx.fillStyle='#8B5E3C';
  ctx.beginPath();ctx.arc(b.x,b.y,18,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#6B4423';
  ctx.beginPath();ctx.arc(b.x-11,b.y-13,7,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(b.x+11,b.y-13,7,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#F5C49E';
  ctx.beginPath();ctx.arc(b.x,b.y+3,9,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#111';
  ctx.beginPath();ctx.arc(b.x-6,b.y-4,2.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(b.x+6,b.y-4,2.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(b.x,b.y+3,2,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawBee(bee){
  ctx.save();
  ctx.fillStyle='#F5C400';
  ctx.beginPath();ctx.ellipse(bee.x,bee.y,9,6,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#333';ctx.lineWidth=1.4;
  ctx.beginPath();ctx.moveTo(bee.x-5,bee.y-1);ctx.lineTo(bee.x+5,bee.y-1);ctx.stroke();
  ctx.beginPath();ctx.moveTo(bee.x-3,bee.y+2);ctx.lineTo(bee.x+3,bee.y+2);ctx.stroke();
  ctx.fillStyle='#333';
  ctx.beginPath();ctx.arc(bee.x+8,bee.y,4,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=0.45;ctx.fillStyle='#cce8ff';
  ctx.beginPath();ctx.ellipse(bee.x,bee.y-7,6,4,-0.3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(bee.x+4,bee.y-6,5,3,0.4,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawJar(j){
  ctx.save();
  ctx.fillStyle='#F5A623';
  ctx.beginPath();ctx.roundRect(j.x-9,j.y-11,18,20,4);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.3)';
  ctx.beginPath();ctx.roundRect(j.x-6,j.y-8,5,10,2);ctx.fill();
  ctx.fillStyle='#ccc';
  ctx.beginPath();ctx.roundRect(j.x-7,j.y-15,14,5,2);ctx.fill();
  ctx.restore();
}

function drawHeart(h){
  ctx.save();
  let sc=1+0.12*Math.sin(h.pulse*0.15);
  ctx.translate(h.x,h.y);ctx.scale(sc,sc);
  ctx.fillStyle='#E24B4A';
  ctx.beginPath();
  ctx.moveTo(0,4);
  ctx.bezierCurveTo(-14,-6,-14,-18,0,-12);
  ctx.bezierCurveTo(14,-18,14,-6,0,4);
  ctx.fill();
  ctx.restore();
}

/* --- bee separation (no overlap) --- */
function separateBees(){
  const bees=s.bees;
  for(let i=0;i<bees.length;i++){
    for(let j=i+1;j<bees.length;j++){
      const a=bees[i],b=bees[j];
      const minD=a.r+b.r;
      const d=dst(a.x,a.y,b.x,b.y);
      if(d<minD && d>0.01){
        const nx=(b.x-a.x)/d, ny=(b.y-a.y)/d;
        const overlap=(minD-d)/2;
        a.x-=nx*overlap; a.y-=ny*overlap;
        b.x+=nx*overlap; b.y+=ny*overlap;
        // elastic bounce: swap velocity components along normal
        const dvx=a.vx-b.vx, dvy=a.vy-b.vy;
        const dot=dvx*nx+dvy*ny;
        if(dot>0){
          a.vx-=dot*nx; a.vy-=dot*ny;
          b.vx+=dot*nx; b.vy+=dot*ny;
        }
      }
    }
  }
}

/* --- main loop --- */
function gameLoop(){
  if(!s.running)return;
  const b=s.bear;

  // bear movement
  let dx=0,dy=0;
  if(keys['ArrowLeft']||keys['a'])dx-=1;
  if(keys['ArrowRight']||keys['d'])dx+=1;
  if(keys['ArrowUp']||keys['w'])dy-=1;
  if(keys['ArrowDown']||keys['s'])dy+=1;
  Object.values(touches).forEach(t=>{dx+=t.dx;dy+=t.dy;});
  if(dx&&dy){dx*=0.707;dy*=0.707;}
  b.x=Math.max(b.r,Math.min(W-b.r,b.x+dx*b.speed));
  b.y=Math.max(b.r,Math.min(H-b.r,b.y+dy*b.speed));
  if(b.inv>0)b.inv--;

  // bees chase + wall bounce
  s.bees.forEach(bee=>{
    const ang=Math.atan2(b.y-bee.y,b.x-bee.x);
    bee.vx=bee.vx*0.85+Math.cos(ang)*bee.speed*0.15;
    bee.vy=bee.vy*0.85+Math.sin(ang)*bee.speed*0.15;
    const spd=Math.sqrt(bee.vx**2+bee.vy**2);
    if(spd>bee.speed){bee.vx=bee.vx/spd*bee.speed;bee.vy=bee.vy/spd*bee.speed;}
    bee.x+=bee.vx; bee.y+=bee.vy;
    if(bee.x<bee.r){bee.x=bee.r;bee.vx=Math.abs(bee.vx);}
    if(bee.x>W-bee.r){bee.x=W-bee.r;bee.vx=-Math.abs(bee.vx);}
    if(bee.y<bee.r){bee.y=bee.r;bee.vy=Math.abs(bee.vy);}
    if(bee.y>H-bee.r){bee.y=H-bee.r;bee.vy=-Math.abs(bee.vy);}
  });
  separateBees();

  // bee hits bear
  if(b.inv===0){
    for(let bee of s.bees){
      if(dst(bee.x,bee.y,b.x,b.y)<b.r+bee.r-4){
        s.lives--; b.inv=130;
        setLives();
        if(s.lives<=0){endGame();return;}
        break;
      }
    }
  }

  // jar collect
  if(dst(s.jar.x,s.jar.y,b.x,b.y)<b.r+13){
    s.score++;
    document.getElementById('score').textContent=s.score;
    spawnBee(s); setBees();
    const np=safePos(b,130);
    s.jar={x:np.x,y:np.y};
  }

  // hearts
  s.hearts=s.hearts.filter(h=>{
    h.pulse++;
    if(dst(h.x,h.y,b.x,b.y)<b.r+14){
      s.lives=Math.min(s.lives+1,6); setLives(); return false;
    }
    return true;
  });
  s.heartTimer++;
  if(s.heartTimer>=600){
    s.heartTimer=0;
    const hp=safePos(b,100);
    s.hearts.push({x:hp.x,y:hp.y,pulse:0});
  }

  // draw
  drawBg();
  drawJar(s.jar);
  s.hearts.forEach(drawHeart);
  s.bees.forEach(drawBee);
  drawBear(b);

  animId=requestAnimationFrame(gameLoop);
}

function endGame(){
  s.running=false; cancelAnimationFrame(animId);
  const ov=document.getElementById('overlay');
  ov.innerHTML=`<h2>Játék vége!</h2><p>Összegyűjtött üvegek: ${s.score} 🍯<br>Méhek: ${s.bees.length} 🐝</p><button id="startBtn">Újra</button>`;
  ov.style.display='flex';
  document.getElementById('startBtn').addEventListener('click',startGame);
}

function startGame(){
  cancelAnimationFrame(animId);
  s=initState();
  s.running=true;
  document.getElementById('score').textContent='0';
  setLives(); setBees();
  document.getElementById('overlay').style.display='none';
  gameLoop();
}

document.getElementById('startBtn').addEventListener('click',startGame);
document.addEventListener('keydown',e=>{keys[e.key]=true;['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)&&e.preventDefault();});
document.addEventListener('keyup',e=>{keys[e.key]=false;});

[['tb-up',0,-1],['tb-down',0,1],['tb-left',-1,0],['tb-right',1,0]].forEach(([id,dx,dy])=>{
  const el=document.getElementById(id);
  const on=()=>{touches[id]={dx,dy};};
  const off=()=>{delete touches[id];};
  el.addEventListener('touchstart',e=>{e.preventDefault();on();},{passive:false});
  el.addEventListener('touchend',e=>{e.preventDefault();off();},{passive:false});
  el.addEventListener('mousedown',on);
  el.addEventListener('mouseup',off);
  el.addEventListener('mouseleave',off);
});
</script>
